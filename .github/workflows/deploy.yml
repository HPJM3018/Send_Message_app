name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run build 
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
          fi

  unit-tests:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Jest tests
        run: npm test
      
      - name: Upload test coverage report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check vulnerabilities with npm audit
        run: |
          npm audit --registry=https://registry.npmjs.org --audit-level=moderate || true      
      - name: Check outdated packages
        run: |
          npm outdated || true
      
      - name: Generate security report
        run: |
          echo "# Security Report" > security-report.md
          echo "" >> security-report.md
          echo "## npm audit results:" >> security-report.md
          echo "\`\`\`" >> security-report.md
          npm audit || true >> security-report.md
          echo "\`\`\`" >> security-report.md
          echo "" >> security-report.md
          echo "## Outdated packages:" >> security-report.md
          echo "\`\`\`" >> security-report.md
          npm outdated >> security-report.md || echo "No outdated packages" >> security-report.md
          echo "\`\`\`" >> security-report.md
      
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: security-report.md
          retention-days: 7

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [unit-tests, security-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install Vercel CLI
        run: npm install -g vercel
      
      - name: Deploy to Vercel Production
        run: |
          vercel --token ${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes \
            --confirm
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      
      - name: Show deployment URL
        run: |
          echo "Deployment successful!"
          echo "Your app is live at: https://${{ secrets.VERCEL_PROJECT_ID }}.vercel.app"